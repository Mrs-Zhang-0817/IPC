<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太古神木 | 2D 悬疑解谜</title>
  <style>
    :root {
      --ink: #0b0c10;
      --gold: #c5a880;
      --gold-bright: #ecd8b7;
      --red: #9b2f23;
      --sidebar-width: 60px;
      --drawer-width: 35%;
      --master-bg: url("assets/bg_master.png"), url("assets/图片·关卡1/主背景1重绘·最初.png");
      --notebook-bg: url("assets/bg_notebook.png"), url("assets/图片·序章/道具/推理板.png");
      --tree-closeup-absolute: url("file:///D:/OneDrive%20-%20The%20University%20of%20Nottingham%20Ningbo%20China/%E6%A1%8C%E9%9D%A2/IPC/assets/%E5%9B%BE%E7%89%87%C2%B7%E5%85%B3%E5%8D%A11/%E5%88%86%E8%A7%86%E8%A7%921%E9%87%8D%E7%BB%98%C2%B7%E6%A0%91.png");
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--gold);
      background:
        radial-gradient(circle at 50% 18%, rgba(197, 168, 128, 0.1), transparent 34%),
        linear-gradient(145deg, #030304 0%, var(--ink) 48%, #020203 100%);
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
    }

    button { font: inherit; }

    #game-container {
      position: relative;
      width: min(96vw, calc(96vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #050608;
      border: 1px solid rgba(197, 168, 128, 0.55);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.82), inset 0 0 120px rgba(0, 0, 0, 0.58);
      isolation: isolate;
    }

    #scene-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: var(--master-bg);
      background-size: cover;
      background-position: center;
    }

    #scene-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(5, 6, 8, 0.7), transparent 20%, transparent 76%, rgba(5, 6, 8, 0.42)),
        radial-gradient(circle at 56% 47%, transparent 0%, rgba(0, 0, 0, 0.44) 78%);
    }

    #level-stage {
      position: absolute;
      inset: 0 0 0 var(--sidebar-width);
      z-index: 2;
    }

    .level-title {
      position: absolute;
      left: 28px;
      top: 22px;
      margin: 0;
      color: var(--gold-bright);
      font-size: clamp(20px, 2.2vw, 34px);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.9);
      pointer-events: none;
    }

    .level-subtitle {
      position: absolute;
      left: 30px;
      top: clamp(58px, 7.4vw, 84px);
      max-width: 34ch;
      margin: 0;
      color: rgba(236, 216, 183, 0.76);
      font-size: clamp(12px, 1.1vw, 16px);
      line-height: 1.7;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
      pointer-events: none;
    }

    #hotspots {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      padding: 0;
      color: var(--gold-bright);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      pointer-events: auto;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .hotspot:hover {
      border-color: rgba(197, 168, 128, 0.58);
      background: rgba(197, 168, 128, 0.05);
      box-shadow: 0 0 22px rgba(197, 168, 128, 0.18);
    }

    .hotspot span {
      position: absolute;
      left: 50%;
      top: 100%;
      min-width: max-content;
      padding: 4px 8px;
      color: #f1dfc3;
      background: rgba(8, 8, 8, 0.78);
      border: 1px solid rgba(197, 168, 128, 0.3);
      border-radius: 3px;
      font-size: 12px;
      opacity: 0;
      transform: translateX(-50%);
      transition: opacity 160ms ease, translate 160ms ease;
      pointer-events: none;
    }

    .hotspot:hover span {
      opacity: 1;
      translate: 0 8px;
    }

    #tree-hotspot {
      left: 46%;
      top: 12%;
      width: 14%;
      height: 42%;
      border: 1px dashed rgba(197, 168, 128, 0.3);
      border-radius: 2px;
      background: rgba(197, 168, 128, 0.035);
      box-shadow: inset 0 0 18px rgba(197, 168, 128, 0.06);
      animation: breath 3s infinite ease-in-out;
    }

    #pot-left-hotspot {
      left: 4%;
      top: 66%;
      width: 11%;
      height: 12%;
      border-radius: 14px;
    }

    #pot-right-hotspot {
      left: 83%;
      top: 66%;
      width: 9%;
      height: 12%;
      border-radius: 14px;
    }

    #closeup-view-container {
      position: absolute;
      inset: 0;
      z-index: 6;
      overflow: hidden;
      background-color: var(--ink);
      background-image: var(--tree-closeup-absolute);
      background-size: cover;
      background-position: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
    }

    #closeup-view-container.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    #closeup-view-container.shake {
      animation: shake 0.5s ease-in-out;
    }

    #closeup-view-container::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.32) 76%);
    }

    #closeup-interaction-zone {
      position: absolute;
      left: 38%;
      top: 14%;
      z-index: 2;
      width: 30%;
      height: 70%;
      padding: 0;
      background: transparent;
      border: 1px dashed rgba(197, 168, 128, 0.18);
      border-radius: 4px;
      cursor: pointer;
    }

    #tree-effects {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .axe-wound {
      position: absolute;
      left: 48%;
      top: 45%;
      width: 150px;
      height: 14px;
      background: linear-gradient(90deg, transparent, #2b2114 12%, #d5b15f 50%, #2b2114 88%, transparent);
      border-radius: 999px;
      box-shadow: 0 0 22px rgba(213, 177, 95, 0.58);
      transform: rotate(-12deg);
    }

    .axe-wound.healing {
      animation: woundHeal 1200ms ease-in forwards;
    }

    .fire-silk-wrap {
      position: absolute;
      left: 43%;
      top: 22%;
      width: 24%;
      height: 52%;
      border-radius: 48%;
      border: 3px solid rgba(155, 47, 35, 0.85);
      box-shadow: 0 0 18px rgba(155, 47, 35, 0.45), inset 0 0 24px rgba(197, 168, 128, 0.16);
      transform: rotate(-10deg);
      animation: silkPulse 1300ms ease-in-out infinite alternate;
    }

    .abyss-crack {
      position: absolute;
      left: 51%;
      top: 17%;
      width: 34px;
      height: 68%;
      background: linear-gradient(180deg, transparent 0%, #010101 8%, #000 88%, transparent 100%);
      clip-path: polygon(42% 0, 66% 8%, 48% 19%, 72% 33%, 44% 49%, 61% 63%, 38% 80%, 55% 100%, 22% 86%, 34% 70%, 15% 53%, 36% 36%, 19% 18%);
      box-shadow: 0 0 34px rgba(0, 0, 0, 0.95), 0 0 18px rgba(197, 168, 128, 0.24);
      opacity: 0;
      transform: translateX(-50%) scaleY(0.15);
      animation: crackOpen 680ms ease-out forwards;
    }

    #closeup-caption {
      position: absolute;
      left: 50%;
      bottom: 9%;
      z-index: 5;
      width: min(680px, 72%);
      min-height: 54px;
      padding: 13px 20px;
      color: #f4dfbd;
      background: rgba(5, 6, 8, 0.72);
      border: 1px solid rgba(197, 168, 128, 0.42);
      border-radius: 5px;
      line-height: 1.8;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #closeup-caption.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #closeup-exit {
      position: absolute;
      right: 24px;
      bottom: 22px;
      z-index: 5;
      padding: 9px 15px;
      color: var(--gold-bright);
      background: rgba(8, 8, 8, 0.62);
      border: 1px solid rgba(197, 168, 128, 0.48);
      border-radius: 4px;
      cursor: pointer;
    }

    #sidebar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, rgba(5, 6, 8, 0.98), rgba(17, 15, 13, 0.96));
      border-right: 1px solid rgba(197, 168, 128, 0.42);
      box-shadow: 10px 0 28px rgba(0, 0, 0, 0.46);
    }

    .sidebar-btn {
      width: 42px;
      height: 78px;
      display: grid;
      place-items: center;
      padding: 0;
      color: var(--gold);
      background: rgba(197, 168, 128, 0.06);
      border: 1px solid rgba(197, 168, 128, 0.42);
      border-radius: 4px;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      writing-mode: vertical-rl;
    }

    .sidebar-btn:hover,
    .sidebar-btn.active {
      color: var(--gold-bright);
      background: rgba(197, 168, 128, 0.18);
      border-color: rgba(244, 223, 189, 0.76);
    }

    #drawer-panel {
      position: absolute;
      left: var(--sidebar-width);
      top: 0;
      bottom: 0;
      z-index: 9;
      width: var(--drawer-width);
      padding: 24px 22px;
      color: #e7d2b2;
      background-color: rgba(20, 15, 12, 0.94);
      background-image: linear-gradient(rgba(11, 12, 16, 0.24), rgba(11, 12, 16, 0.62)), var(--notebook-bg);
      background-size: cover;
      background-position: center;
      border-right: 1px solid rgba(197, 168, 128, 0.48);
      box-shadow: 22px 0 42px rgba(0, 0, 0, 0.58);
      transform: translateX(calc(-100% - var(--sidebar-width)));
      transition: transform 320ms ease;
    }

    #drawer-panel.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(197, 168, 128, 0.34);
    }

    #drawer-title {
      margin: 0;
      color: #f1ddbd;
      font-size: clamp(18px, 1.8vw, 25px);
    }

    #close-drawer {
      width: 34px;
      height: 34px;
      color: #e7d2b2;
      background: rgba(8, 8, 8, 0.36);
      border: 1px solid rgba(197, 168, 128, 0.42);
      border-radius: 4px;
      cursor: pointer;
    }

    #drawer-content {
      height: calc(100% - 54px);
      padding-top: 16px;
      overflow: auto;
    }

    .skill-grid,
    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .skill-card,
    .item-card {
      min-height: 84px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px;
      color: #ead8bd;
      background: rgba(8, 8, 8, 0.5);
      border: 1px solid rgba(197, 168, 128, 0.32);
      border-radius: 6px;
      cursor: pointer;
    }

    .skill-card.active,
    .item-card.equipped {
      border-color: rgba(244, 223, 189, 0.88);
      box-shadow: 0 0 18px rgba(197, 168, 128, 0.22);
    }

    .skill-card.locked img {
      filter: grayscale(100%) opacity(50%);
    }

    .skill-card img,
    .item-card img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .card-name {
      font-size: 13px;
      line-height: 1.25;
      text-align: center;
    }

    .empty-note,
    .clue-list {
      margin: 0;
      padding: 0;
      color: rgba(234, 216, 189, 0.82);
      font-size: 15px;
      line-height: 1.8;
      list-style: none;
    }

    .clue-list li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(197, 168, 128, 0.22);
    }

    #toast {
      position: absolute;
      left: 50%;
      bottom: 8%;
      z-index: 18;
      max-width: min(560px, 74%);
      padding: 14px 22px;
      color: #f4dfbd;
      background: linear-gradient(180deg, rgba(35, 28, 20, 0.97), rgba(11, 12, 16, 0.97));
      border: 1px solid rgba(197, 168, 128, 0.62);
      border-radius: 6px;
      text-align: center;
      line-height: 1.7;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 14px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    #toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 34px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      width: min(720px, 86%);
      display: flex;
      gap: 26px;
      align-items: center;
      padding: 28px;
      color: #e7d2b2;
      background: var(--ink);
      border: 2px outset var(--gold);
      box-shadow: 0 0 0 6px rgba(197, 168, 128, 0.08), 0 0 0 9px rgba(11, 12, 16, 0.95), 0 0 0 11px rgba(197, 168, 128, 0.34), 0 28px 80px rgba(0, 0, 0, 0.8);
    }

    .artifact-frame {
      flex: 0 0 210px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(197, 168, 128, 0.16), transparent 62%), #08090c;
    }

    .artifact-frame img {
      max-width: 76%;
      max-height: 76%;
      object-fit: contain;
    }

    .modal-text h2 {
      margin: 0 0 14px;
      color: var(--gold-bright);
      font-size: clamp(22px, 2vw, 30px);
    }

    .property-text {
      margin: 0 0 12px;
      color: #c84a35;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.6;
    }

    .story-text {
      margin: 0;
      color: rgba(231, 210, 178, 0.72);
      font-size: 14px;
      line-height: 1.9;
    }

    .modal-close {
      margin-top: 22px;
      padding: 9px 18px;
      color: var(--gold-bright);
      background: rgba(197, 168, 128, 0.08);
      border: 1px solid rgba(197, 168, 128, 0.52);
      border-radius: 4px;
      cursor: pointer;
    }

    #blackout {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 40px;
      color: var(--gold-bright);
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1200ms ease;
    }

    #blackout.show {
      opacity: 1;
      pointer-events: auto;
    }

    #typewriter {
      max-width: 24em;
      font-size: clamp(22px, 3vw, 42px);
      line-height: 1.8;
      text-align: center;
    }

    @keyframes breath {
      0%, 100% { border-color: rgba(197, 168, 128, 0.22); box-shadow: inset 0 0 12px rgba(197, 168, 128, 0.04), 0 0 8px rgba(197, 168, 128, 0.06); }
      50% { border-color: rgba(197, 168, 128, 0.5); box-shadow: inset 0 0 22px rgba(197, 168, 128, 0.09), 0 0 18px rgba(197, 168, 128, 0.18); }
    }

    @keyframes woundHeal {
      0% { width: 150px; opacity: 1; }
      70% { width: 18px; opacity: 0.85; }
      100% { width: 0; opacity: 0; }
    }

    @keyframes silkPulse {
      from { opacity: 0.68; filter: drop-shadow(0 0 5px rgba(155, 47, 35, 0.45)); }
      to { opacity: 1; filter: drop-shadow(0 0 16px rgba(197, 168, 128, 0.28)); }
    }

    @keyframes crackOpen {
      0% { opacity: 0; transform: translateX(-50%) scaleY(0.15) scaleX(0.35); }
      65% { opacity: 1; transform: translateX(-50%) scaleY(1.04) scaleX(1.15); }
      100% { opacity: 1; transform: translateX(-50%) scaleY(1) scaleX(1); }
    }

    @keyframes shake {
      0%, 100% { transform: scale(1) translate(0, 0); }
      15% { transform: scale(1.01) translate(-10px, 6px); }
      30% { transform: scale(1.01) translate(9px, -6px); }
      45% { transform: scale(1.01) translate(-7px, -8px); }
      60% { transform: scale(1.01) translate(8px, 5px); }
      75% { transform: scale(1.01) translate(-5px, 4px); }
    }

    @media (max-width: 760px) {
      :root {
        --sidebar-width: 52px;
        --drawer-width: calc(100% - var(--sidebar-width));
      }

      #game-container { width: 100vw; }
      .skill-grid, .item-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .modal-content { width: 96%; flex-direction: column; gap: 16px; padding: 22px; }
      .artifact-frame { flex-basis: 160px; }
    }
  </style>
</head>
<body>
  <main id="game-container" aria-label="玄黑悬疑解谜游戏">
    <div id="scene-layer"></div>

    <section id="level-stage" aria-label="当前关卡场景">
      <h1 class="level-title">第一关：太古神木</h1>
      <p class="level-subtitle">地下神木祠全景。神木主根盘踞中央，两侧旧物与残破祭坛掩着关键器物。</p>
      <div id="hotspots">
        <button id="tree-hotspot" class="hotspot" type="button" aria-label="神木主根"><span>神木主根</span></button>
        <button id="pot-left-hotspot" class="hotspot" type="button" aria-label="残破祭坛"><span>残破祭坛</span></button>
        <button id="pot-right-hotspot" class="hotspot" type="button" aria-label="旧物堆"><span>旧物堆</span></button>
      </div>
    </section>

    <section id="closeup-view-container" aria-hidden="true">
      <button id="closeup-interaction-zone" type="button" aria-label="树干特写互动区"></button>
      <div id="tree-effects" aria-hidden="true"></div>
      <div id="closeup-caption" aria-live="polite"></div>
      <button id="closeup-exit" type="button">返回全景</button>
    </section>

    <aside id="sidebar" aria-label="全局侧边栏">
      <button class="sidebar-btn" type="button" data-panel="skills" aria-label="打开秘术面板">能</button>
      <button class="sidebar-btn" type="button" data-panel="clues" aria-label="打开线索面板">物</button>
      <button class="sidebar-btn" type="button" data-panel="inventory" aria-label="打开行囊面板">器</button>
    </aside>

    <section id="drawer-panel" aria-hidden="true">
      <div class="drawer-header">
        <h2 id="drawer-title">九门秘术</h2>
        <button id="close-drawer" type="button" aria-label="关闭面板">×</button>
      </div>
      <div id="drawer-content"></div>
    </section>

    <section id="ancient-modal" class="modal-overlay" aria-hidden="true">
      <article class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="artifact-frame"><img id="modal-image" src="" alt=""></div>
        <div class="modal-text">
          <h2 id="modal-title"></h2>
          <p id="modal-property" class="property-text"></p>
          <p id="modal-story" class="story-text"></p>
          <button id="modal-close" class="modal-close" type="button">收起铭文</button>
        </div>
      </article>
    </section>

    <div id="toast" role="status" aria-live="polite"></div>
    <div id="blackout" aria-hidden="true"><div id="typewriter"></div></div>
  </main>

  <script>
    let currentLevel = 'level1';
    let unlockedSkills = ['insight', 'rubbing'];
    let globalInventory = [
      { id: 'firestarter', name: '火折子', icon: 'assets/盗墓工具/火折子.png', description: '上一关带入的照明器具。' }
    ];
    let globalClues = [
      '地下神木祠内壁残留暗金纹路。',
      '主根附近有朱丝与金器才能破开的五行痕迹。'
    ];
    let activeSkill = null;
    let activePanel = null;
    let equippedItem = null;
    let isTreeCloseup = false;
    let isTreeBurnt = false;
    let isLevelComplete = false;
    let toastTimer = null;

    const skills = [
      { id: 'insight', name: '观纹', icon: 'assets/技能标识/观纹.png' },
      { id: 'rubbing', name: '拓印', icon: 'assets/技能标识/拓印.png' },
      { id: 'listenWind', name: '听风', icon: 'assets/技能标识/听风.png' },
      { id: 'sealBreath', name: '封气', icon: 'assets/技能标识/封气.png' },
      { id: 'soilProbe', name: '探土', icon: 'assets/技能标识/探土.png' },
      { id: 'threading', name: '牵线', icon: 'assets/技能标识/牵线.png' },
      { id: 'discernFalse', name: '辩伪', icon: 'assets/技能标识/辩伪.png' },
      { id: 'hiddenEighth', name: '未名', icon: 'assets/技能标识/观纹.png' }
    ];

    const itemCatalog = {
      bronzeAxe: { id: 'bronzeAxe', name: '青铜斧', icon: 'assets/图片·关卡1/青铜斧.png', description: '金斧属金，金乃断木。' },
      silk: { id: 'silk', name: '朱丝', icon: 'assets/图片·关卡1/朱线.png', description: '朱丝属火，火灼其灵。' },
      firestarter: { id: 'firestarter', name: '火折子', icon: 'assets/盗墓工具/火折子.png', description: '暗室行路与点火之器。' }
    };

    const panelTitles = { skills: '九门秘术', clues: '线索札记', inventory: '随身行囊' };

    const gameContainer = document.querySelector('#game-container');
    const drawer = document.querySelector('#drawer-panel');
    const drawerTitle = document.querySelector('#drawer-title');
    const drawerContent = document.querySelector('#drawer-content');
    const closeDrawerButton = document.querySelector('#close-drawer');
    const sidebarButtons = document.querySelectorAll('.sidebar-btn');
    const toast = document.querySelector('#toast');
    const ancientModal = document.querySelector('#ancient-modal');
    const modalTitle = document.querySelector('#modal-title');
    const modalImage = document.querySelector('#modal-image');
    const modalProperty = document.querySelector('#modal-property');
    const modalStory = document.querySelector('#modal-story');
    const modalClose = document.querySelector('#modal-close');
    const closeupView = document.querySelector('#closeup-view-container');
    const closeupInteractionZone = document.querySelector('#closeup-interaction-zone');
    const closeupExit = document.querySelector('#closeup-exit');
    const closeupCaption = document.querySelector('#closeup-caption');
    const treeEffects = document.querySelector('#tree-effects');
    const blackout = document.querySelector('#blackout');
    const typewriter = document.querySelector('#typewriter');

    function openPanel(panelName) {
      activePanel = panelName;
      drawerTitle.textContent = panelTitles[panelName];
      drawer.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
      sidebarButtons.forEach((button) => button.classList.toggle('active', button.dataset.panel === panelName));
      renderPanel(panelName);
    }

    function closePanel() {
      activePanel = null;
      drawer.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
      sidebarButtons.forEach((button) => button.classList.remove('active'));
    }

    function renderPanel(panelName) {
      if (panelName === 'skills') renderSkillsPanel();
      if (panelName === 'clues') renderCluesPanel();
      if (panelName === 'inventory') renderInventoryPanel();
    }

    function renderSkillsPanel() {
      drawerContent.innerHTML = `<div class="skill-grid">${skills.map((skill) => {
        const isUnlocked = unlockedSkills.includes(skill.id);
        const isActive = activeSkill === skill.id;
        return `<button class="skill-card ${isUnlocked ? '' : 'locked'} ${isActive ? 'active' : ''}" type="button" data-skill="${skill.id}" aria-label="${skill.name}${isUnlocked ? '' : '，未觉醒'}"><img src="${skill.icon}" alt=""><span class="card-name">${skill.name}</span></button>`;
      }).join('')}</div>`;
    }

    function renderCluesPanel() {
      drawerContent.innerHTML = globalClues.length
        ? `<ul class="clue-list">${globalClues.map((clue) => `<li>${clue}</li>`).join('')}</ul>`
        : '<p class="empty-note">尚未获得线索。</p>';
    }

    function renderInventoryPanel() {
      drawerContent.innerHTML = globalInventory.length
        ? `<div class="item-grid">${globalInventory.slice(0, 8).map((item) => `<button class="item-card ${equippedItem === item.id ? 'equipped' : ''}" type="button" data-item="${item.id}" aria-label="${item.name}"><img src="${item.icon}" alt=""><span class="card-name">${item.name}</span></button>`).join('')}</div>`
        : '<p class="empty-note">行囊暂空。</p>';
    }

    function activateSkill(skillId) {
      if (!unlockedSkills.includes(skillId)) {
        showToast('此秘术尚未觉醒，无法使用。');
        return;
      }
      activeSkill = activeSkill === skillId ? null : skillId;
      renderSkillsPanel();
    }

    function handleInventoryItemClick(itemId) {
      const item = globalInventory.find((storedItem) => storedItem.id === itemId);
      if (!item) return;
      equippedItem = equippedItem === itemId ? null : itemId;
      showToast(equippedItem ? `已装备【${item.name}】。` : `已收起【${item.name}】。`);
      renderInventoryPanel();
    }

    function addInventoryItem(item) {
      if (!globalInventory.some((storedItem) => storedItem.id === item.id)) {
        globalInventory.push(item);
      }
      if (activePanel === 'inventory') renderInventoryPanel();
    }

    function searchLeftPot() {
      if (globalInventory.some((item) => item.id === 'silk')) {
        showToast('残破祭坛已被搜寻过。');
        return;
      }
      addInventoryItem(itemCatalog.silk);
      showAncientModal('朱丝', itemCatalog.silk.icon, '朱丝属火，火灼其灵', '你在尘封的残破祭坛下方，竟然扯出一缕紧绷的红线……获得道具【朱丝】。');
    }

    function searchRightPot() {
      if (globalInventory.some((item) => item.id === 'bronzeAxe')) {
        showToast('旧物堆已被搜寻过。');
        return;
      }
      addInventoryItem(itemCatalog.bronzeAxe);
      showAncientModal('青铜斧', itemCatalog.bronzeAxe.icon, '金斧属金，金乃断木', '你在旧物堆中翻找，发现了一柄沉重的青铜斧……获得道具【青铜斧】。');
    }

    function openTreeCloseup() {
      closePanel();
      isTreeCloseup = true;
      closeupView.classList.add('active');
      closeupView.setAttribute('aria-hidden', 'false');
      clearCloseupCaption();
    }

    function closeTreeCloseup() {
      if (isLevelComplete) return;
      isTreeCloseup = false;
      closeupView.classList.remove('active', 'shake');
      closeupView.setAttribute('aria-hidden', 'true');
      clearCloseupCaption();
    }

    function handleCloseupTreeClick() {
      if (!isTreeCloseup) return;
      if (equippedItem === 'bronzeAxe' && isTreeBurnt) {
        completeLevelOne();
        return;
      }
      if (equippedItem === 'bronzeAxe') {
        createHealingWound();
        typeCloseupText('神木生合不断！直接砍伐无效！');
        return;
      }
      if (equippedItem === 'silk' || equippedItem === 'fireSilk') {
        isTreeBurnt = true;
        renderTreeEffects();
        typeCloseupText(equippedItem === 'fireSilk' ? '附火朱丝缠上树身，神木灵性被火势压住。' : '朱丝缠上树身，神木灵性被火势压住。');
        return;
      }
      typeCloseupText('树干纹路深处似有五行闭锁，需要合适器物。');
    }

    function createHealingWound() {
      const wound = document.createElement('div');
      wound.className = 'axe-wound healing';
      treeEffects.appendChild(wound);
      window.setTimeout(() => wound.remove(), 1250);
    }

    function renderTreeEffects() {
      treeEffects.innerHTML = '';
      if (isTreeBurnt) {
        const wrap = document.createElement('div');
        wrap.className = 'fire-silk-wrap';
        treeEffects.appendChild(wrap);
      }
    }

    function createAbyssCrack() {
      if (treeEffects.querySelector('.abyss-crack')) return;
      const crack = document.createElement('div');
      crack.className = 'abyss-crack';
      treeEffects.appendChild(crack);
    }

    function completeLevelOne() {
      if (isLevelComplete) return;
      isLevelComplete = true;
      closeupView.classList.add('shake');
      createAbyssCrack();
      typeCloseupText('五行破开，神木轰然断裂！');
      window.setTimeout(() => {
        blackout.classList.add('show');
        blackout.setAttribute('aria-hidden', 'false');
        typeText('五行破开，神木轰然断裂！');
      }, 900);
    }

    function typeCloseupText(text) {
      window.clearTimeout(toastTimer);
      closeupCaption.textContent = '';
      closeupCaption.classList.add('show');
      let index = 0;
      const timer = window.setInterval(() => {
        closeupCaption.textContent += text[index];
        index += 1;
        if (index >= text.length) window.clearInterval(timer);
      }, 55);
      toastTimer = window.setTimeout(() => closeupCaption.classList.remove('show'), Math.max(2200, text.length * 85));
    }

    function clearCloseupCaption() {
      closeupCaption.classList.remove('show');
      closeupCaption.textContent = '';
    }

    function typeText(text) {
      typewriter.textContent = '';
      let index = 0;
      const timer = window.setInterval(() => {
        typewriter.textContent += text[index];
        index += 1;
        if (index >= text.length) window.clearInterval(timer);
      }, 95);
    }

    function showAncientModal(title, imgSrc, propertyText, storyText) {
      modalTitle.textContent = title;
      modalImage.src = imgSrc;
      modalProperty.textContent = propertyText;
      modalStory.textContent = storyText;
      ancientModal.classList.add('show');
      ancientModal.setAttribute('aria-hidden', 'false');
    }

    function closeAncientModal() {
      ancientModal.classList.remove('show');
      ancientModal.setAttribute('aria-hidden', 'true');
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = window.setTimeout(() => toast.classList.remove('show'), 1900);
    }

    document.querySelector('#tree-hotspot').addEventListener('click', openTreeCloseup);
    document.querySelector('#pot-left-hotspot').addEventListener('click', searchLeftPot);
    document.querySelector('#pot-right-hotspot').addEventListener('click', searchRightPot);
    closeupInteractionZone.addEventListener('click', (event) => {
      event.stopPropagation();
      handleCloseupTreeClick();
    });
    closeupExit.addEventListener('click', (event) => {
      event.stopPropagation();
      closeTreeCloseup();
    });
    closeupView.addEventListener('click', (event) => {
      if (event.target === closeupView) closeTreeCloseup();
    });
    sidebarButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const panelName = button.dataset.panel;
        if (activePanel === panelName) closePanel();
        else openPanel(panelName);
      });
    });
    closeDrawerButton.addEventListener('click', closePanel);
    drawerContent.addEventListener('click', (event) => {
      const skillButton = event.target.closest('[data-skill]');
      if (skillButton) {
        activateSkill(skillButton.dataset.skill);
        return;
      }
      const itemButton = event.target.closest('[data-item]');
      if (itemButton) handleInventoryItemClick(itemButton.dataset.item);
    });
    ancientModal.addEventListener('click', (event) => {
      if (event.target === ancientModal) closeAncientModal();
    });
    modalClose.addEventListener('click', closeAncientModal);

    window.gameState = {
      get currentLevel() { return currentLevel; },
      get unlockedSkills() { return unlockedSkills; },
      get globalInventory() { return globalInventory; },
      get equippedItem() { return equippedItem; },
      get isTreeBurnt() { return isTreeBurnt; },
      unlockSkill(skillId) {
        if (!unlockedSkills.includes(skillId)) unlockedSkills.push(skillId);
        if (activePanel === 'skills') renderSkillsPanel();
      },
      addInventoryItem,
      addClue(clue) {
        globalClues.push(clue);
        if (activePanel === 'clues') renderCluesPanel();
      }
    };
  </script>
</body>
</html>
